name: Daily Generate

on:
  schedule:
    # Runs daily at 7:00 AM Eastern (EDT = UTC-4)
    # Change to '0 12 * * *' in November when Toronto switches to EST (UTC-5)
    - cron: '0 11 * * *'
  workflow_dispatch: {}

jobs:
  generate:
    name: Generate cartoon concept
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
      INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
      IDEOGRAM_API_KEY: ${{ secrets.IDEOGRAM_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Generate cartoon concept
        working-directory: pipeline
        run: python generate.py

      # TODO: Instagram posting step
      # - name: Post to Instagram
      #   working-directory: pipeline
      #   run: python post_instagram.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: pending-post-${{ github.run_number }}
          path: |
            pipeline/pending_post.json
            pipeline/pending_post_*.json
            pipeline/output_images/*.jpg
          retention-days: 7

      - name: Commit pending_post to daily-output branch
        if: success()
        run: |
          git config user.name "Neural Strip Bot"
          git config user.email "bot@neuralstrip.com"
          git fetch origin
          git checkout -B daily-output
          git add -f pipeline/pending_post.json
          git add -f pipeline/pending_post_*.json
          git add -f pipeline/output_images/ 2>/dev/null || true
          git commit -m "daily: $(date +%Y-%m-%d) cartoon concept + image"
          git push origin daily-output --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish cartoon to main
    needs: generate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch today's files from daily-output branch
        run: |
          git fetch origin daily-output
          mkdir -p pipeline/output_images
          # Use git show (no index side effects) so only website/* lands on main.
          git show origin/daily-output:pipeline/pending_post.json > pipeline/pending_post.json
          DATE=$(python -c "import json; print(json.load(open('pipeline/pending_post.json'))['generated_at'][:10])")
          git show "origin/daily-output:pipeline/output_images/${DATE}.jpg" > "pipeline/output_images/${DATE}.jpg"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Publish to website
        id: publish
        run: |
          DATE=$(python pipeline/publish.py)
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"

      - name: Commit and push to main
        id: commit
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "Neural Strip Bot"
          DATE="${{ steps.publish.outputs.date }}"
          git add "website/images/${DATE}.jpg"
          git add website/cartoons.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "daily: publish ${DATE} cartoon"
          git push origin main
          echo "pushed=true" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Pushes made with GITHUB_TOKEN don't cascade into other workflows,
      # so dispatch the Pages deploy explicitly.
      - name: Trigger GitHub Pages rebuild
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run pages.yml --repo "${{ github.repository }}" --ref main
