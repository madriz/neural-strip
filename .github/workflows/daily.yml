name: Daily Generate

on:
  schedule:
    # Daily at 8:00 UTC (3:00 AM ET)
    - cron: '0 8 * * *'
  workflow_dispatch: {}

jobs:
  generate:
    name: Generate cartoon concept
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
      INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Generate cartoon concept
        working-directory: pipeline
        run: python generate.py

      # TODO: Instagram posting step
      # - name: Post to Instagram
      #   working-directory: pipeline
      #   run: python post_instagram.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: pending-post-${{ github.run_number }}
          path: pipeline/pending_post.json
          retention-days: 30
