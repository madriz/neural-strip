<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Strip — AI Generated Humor about AI</title>
    <meta name="description" content="AI Generated Humor about AI. Because, Why Not?">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f3f0;
            color: #3a3632;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 640px;
            padding: 3rem 1.5rem 2rem;
            text-align: center;
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #2a2825;
            margin-bottom: 0.5rem;
        }

        .tagline {
            font-size: 1.05rem;
            color: #7a756e;
            font-weight: 400;
            line-height: 1.5;
        }

        .divider {
            width: 48px;
            height: 2px;
            background: #c8c3bc;
            margin: 2rem auto;
        }

        main {
            width: 100%;
            max-width: 640px;
            padding: 0 1.5rem 3rem;
        }

        .cards {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .card-placeholder {
            background: #eae7e3;
            border-radius: 12px;
            padding: 2.5rem 2rem;
            text-align: center;
            color: #a09a93;
            font-size: 0.95rem;
            border: 1px dashed #d4d0cb;
        }

        .card-placeholder .icon {
            font-size: 2rem;
            margin-bottom: 0.75rem;
            opacity: 0.5;
        }

        footer {
            width: 100%;
            max-width: 640px;
            padding: 2rem 1.5rem;
            text-align: center;
            font-size: 0.8rem;
            color: #a09a93;
            border-top: 1px solid #e2dfdb;
            margin-top: auto;
        }
    </style>
</head>
<body>
    <header>
        <h1>Neural Strip</h1>
        <p class="tagline">AI Generated Humor about AI. Because, Why Not?</p>
    </header>

    <div class="divider"></div>

    <main>
        <div class="cards">
            <div class="card-placeholder">
                <div class="icon">&#x1f5bc;</div>
                <p>First cartoon drops soon.</p>
                <p>Daily AI news, distilled into single-panel humor.</p>
            </div>
            <div class="card-placeholder">
                <div class="icon">&#x1f916;</div>
                <p>Powered by Claude. Sourced from TechCrunch, The Verge, Ars Technica, Wired, and Hacker News.</p>
            </div>
        </div>
    </main>

    <footer>
        &copy; 2026 Neural Strip &mdash; Built with caffeine and API calls
    </footer>
</body>
</html>
